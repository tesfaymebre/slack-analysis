[tool.pyright]
include = ["src", "tests"]
extraPaths = ["."]
pythonVersion = "3.10"
typeCheckingMode = "basic"

[tool.isort]
profile = "black"

[tool.pytest.ini_options]
addopts = """
--cov-report term-missing \
--cov src -ra"""
testpaths = ["tests"]

[tool.coverage.report]
fail_under = 0
show_missing = true
exclude_lines = ["pragma: no cover", "raise NotImplementedError"]

[tool.interrogate]
ignore-init-method = true
ignore-init-module = true
ignore-magic = true
ignore-private = true
fail-under = 50
verbose = 1
