name: Docstring Coverage

on:
  push:
    branches:
      - main
      - task-*
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  doc_coverage:
    name: Check Docstring Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Check docstring coverage
        run: |
          interrogate src/ -v

      - name: Publish docstring report
        if: always()
        run: |
          interrogate src/ -v > docstring_report.txt 2>&1 || true
          echo "### Docstring coverage report" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat docstring_report.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
