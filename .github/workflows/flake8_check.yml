name: Flake8 Check

on:
  push:
    branches:
      - main
      - task-*
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  flake8_check:
    name: Check Flake8
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run critical Flake8 checks
        run: |
          # Fail the build on syntax errors and undefined names
          flake8 src/ --config=.flake8 \
            --count --select=E9,F63,F7,F82 \
            --show-source --statistics

      - name: Run style Flake8 checks
        continue-on-error: true
        run: |
          flake8 src/ --config=.flake8 \
            --count --exit-zero --statistics \
            --output-file=flake8_output.txt

      - name: Publish Flake8 report
        if: always()
        run: |
          echo "### Flake8 style report" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat flake8_output.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
