# Local databases for Task 3.
# Start with: docker compose up -d
services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: slack
      POSTGRES_PASSWORD: slack
      POSTGRES_DB: slack_features
    ports:
      - "5433:5432"  # host 5433 — 5432 is often taken by a local Postgres install on macOS
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  mongo_data:
  postgres_data:
